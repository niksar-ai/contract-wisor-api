spring.application.name=contract-wisor-api
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/contractwisor}
spring.datasource.username=${DB_USERNAME:contractwisor}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jackson.serialization.fail-on-empty-beans=false
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
# Log levels and appenders are configured in logback-spring.xml.
# (Avoid setting logging.level.* here — those override the logback config.)
server.forward-headers-strategy=framework
server.port=8080
custom.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
temporal.target=${TEMPORAL_TARGET:localhost:7233}
temporal.taskQueue=contract-wisor-taskqueue
temporal.analyzeTaskQueue=contract-wisor-analyze-task-queue
temporal.analyzeTaskQueueAI=contract-wisor-analyze-taskqueue
temporal.parseTaskQueue=contract-wisor-parse-task-queue
temporal.parseTaskQueueAI=contract-wisor-parse-taskqueue
temporal.namespace=default
cwai.api.target=${CWAI_API_TARGET:http://localhost:8000}
api.parseDocument=${PARSE_DOCUMENT_API:http://localhost:8000/api/parseDocument}
jwt.secret=${JWT_SECRET:}
jwt.refresh_secret=${JWT_REFRESH_SECRET:}
jwt.accessToken.validity=86400000
jwt.refreshToken.validity=1296000000
batch.timeout=60000
sftp.secret=${SFTP_SECRET:}
action.enable=false
action.update=false
auth.password.expiry.month=6
auth.password.expiry.enabled=true
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
auth.reset.password.expiry=300000
company.mail.noreply=${COMPANY_MAIL_NOREPLY:noreply@example.com}
web.domain=${WEB_DOMAIN:http://localhost:3000}
company.name=Contract Wisor
company.mail.info=${COMPANY_MAIL_INFO:info@example.com}
